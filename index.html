<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>NO SPACE</title> <!--Internet Studio Final Project-->
	<link rel="stylesheet" href="./assets/css/styles.css">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Londrina+Shadow&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
	img.background {
		position: fixed;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: -1;
	}

	.center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    h1 {
		font-family: 'Orbitron', sans-serif;
		font-size: 5rem;
		letter-spacing: 6px;
		color: white;
		text-transform: uppercase;
		text-shadow:
		0 0 5px white,
		0 0 10px #00f7ff,
		0 0 20px white,
		0 0 40px #00c3ff;
    }
</style>

</head>
<body>

	<img src="assets/img/space.gif" class="background" alt="Space Sky">

	<div class="modal fade" id="infoModal" tabindex="-1">
  	<div class="modal-dialog">
    <div class="modal-content bg-dark text-white border-info">

      <div class="modal-header border-info">
        <h5 class="modal-title">Mars Landing</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
	  
	  <div class="modal-body">
		<img src="assets/img/mars.jpg" class="img-fluid mb-3">
		<p id="modalText"></p>
	  </div>
    </div>
  </div>
</div>

<div class="board">
	<div class="tile" onclick="openCard(1)"></div>
	<div class="tile" onclick="openCard(2)"></div>
	<div class="tile" onclick="openCard(3)"></div>
	<div class="tile" onclick="openCard(4)"></div>
	<div class="tile" onclick="openCard(5)"></div>
	<div class="tile" onclick="openCard(6)"></div>

	<div class="tile" onclick="openCard(7)"></div>
	<div class="tile" onclick="openCard(8)"></div>
	<div class="tile" onclick="openCard(9)"></div>
	<div class="tile" onclick="openCard(10)"></div>

	<div class="tile" onclick="openCard(11)"></div>
	<div class="tile" onclick="openCard(12)"></div>
	<div class="tile" onclick="openCard(13)"></div>
	<div class="tile" onclick="openCard(14)"></div>
	<div class="tile" onclick="openCard(15)"></div>
	<div class="tile" onclick="openCard(16)"></div>

	<div class="tile" onclick="openCard(17)"></div>
	<div class="tile" onclick="openCard(18)"></div>
	<div class="tile" onclick="openCard(19)"></div>
	<div class="tile" onclick="openCard(20)"></div>
</div>

	<div class="center">
		<button class="btn btn-light mt-3">Resource Bank:</button>
		<button class="btn btn-light mt-4">$50 Million</button>
		<button class="btn btn-light mt-3">Lives:</button>
		<button class="btn btn-light mt-4">❤️</button>
		<button class="btn btn-light mt-4">❤️</button>
		<button class="btn btn-light mt-4">❤️</button>
		<h1 class="title">
			<span class="word">
				<span class="default">MY</span>
				<span class="hover">NO</span>
			</span>
			SPACE
		</h1>
		<button class="btn btn-light mt-3" onclick="roll()">#</button>
		<p id="rollResult" class="mt-2"></p>
	</div>

	<script src="./assets/js/main.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
