<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>NO SPACE</title> <!--Internet Studio Final Project-->
	<link rel="stylesheet" href="./assets/css/styles.css">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&family=Londrina+Shadow&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
	img.background {
		position: fixed;
		width: 100%;
		height: 100%;
		object-fit: cover;
		z-index: -1;
	}

	.center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    h1 {
		font-family: 'Orbitron', sans-serif;
		font-size: 5rem;
		letter-spacing: 6px;
		color: white;
		text-transform: uppercase;
		text-shadow:
		0 0 5px white,
		0 0 10px #00f7ff,
		0 0 20px white,
		0 0 40px #00c3ff;
    }
</style>

</head>
<body>

	<img src="assets/img/space.gif" class="background" alt="Space Sky">

	<div class="modal fade" id="infoModal" tabindex="-1">
  	<div class="modal-dialog">
    <div class="modal-content bg-dark text-white border-info">

      <div class="modal-header border-info">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
	  
	  <div class="modal-body">
		<img src="">
		<p id="modalText"></p>
		<button id="modalButton" class="btn btn-light"></button>
	  </div>
    </div>
  </div>
</div>

	<div class="resources">
		RESOURCES: $<span id="money">100</span>M
	</div>
	<div class="lives">
		LIVES: <span id="lives">5</span>
	</div>


<div class="board">
	<div class="tile void-tile" onclick="openCard(6)"><span class="tile-number">6</span></div>
	<div class="tile jptmoons-tile" onclick="openCard(7)"><span class="tile-number">7</span></div>
	<div class="tile saturn-tile" onclick="openCard(8)"><span class="tile-number">8</span></div>
	<div class="tile stnmoons-tile" onclick="openCard(9)"><span class="tile-number">9</span></div>
	<div class="tile uranus-tile" onclick="openCard(10)"><span class="tile-number">10</span></div>
	
	<div class="tile oxygen-tile" onclick="openCard(11)"><span class="tile-number">11</span></div>
	<div class="tile ice-tile" onclick="openCard(12)"><span class="tile-number">12</span></div>
	<div class="tile neptune-tile" onclick="openCard(13)"><span class="tile-number">13</span></div>
	<div class="tile kuiper-tile" onclick="openCard(14)"><span class="tile-number">14</span></div>
	<div class="tile pluto-tile" onclick="openCard(15)"><span class="tile-number">15</span></div>

	<div class="tile blackhole-tile" onclick="openCard(16)"><span class="tile-number">16</span></div>
	<div class="tile andromeda-tile" onclick="openCard(17)"><span class="tile-number">17</span></div>
	<div class="tile sun-tile" onclick="openCard(18)"><span class="tile-number">18</span></div>
	<div class="tile mercury-tile" onclick="openCard(19)"><span class="tile-number">19</span></div>
	<div class="tile venus-tile" onclick="openCard(20)"><span class="tile-number">20</span></div>

	<div class="tile launch-tile" onclick="openCard(1)"><span class="tile-number">1</span></div>
	<div class="tile moon-tile" onclick="openCard(2)"><span class="tile-number">2</span></div>
	<div class="tile mars-tile" onclick="openCard(3)"><span class="tile-number">3</span></div>
	<div class="tile asteroid-tile" onclick="openCard(4)"><span class="tile-number">4</span></div>
	<div class="tile jupiter-tile" onclick="openCard(5)"><span class="tile-number">5</span></div>
</div>


	<div class="center">
		<h1 class="title">
			<span class="word">
				<span class="default">MY</span>
				<span class="hover">NO</span>
			</span>
			SPACE
		</h1>
		<button onclick="roll()">ROLL</button>
		<div id="rollResult" class="dice-display">#</div>
	</div>

	<script src="./assets/js/main.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
